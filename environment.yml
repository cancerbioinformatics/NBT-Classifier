# Note: TensorFlow pinned for NumPy 1.23 compatibility (required by HistoQC)
name: nbtclassifier
channels:
  - conda-forge
dependencies:
  - python=3.10
  - pip

  - numpy=1.23.5
  - scipy=1.10.0
  - pandas=1.5.*
  - scikit-image=0.19.*
  - scikit-learn=1.2.*
  - statsmodels
  - matplotlib-base
  - seaborn
  - h5py=3.8.*

  - openslide
  - opencv
  - pillow
  - imageio
  - tifffile

  - tqdm
  - pyyaml
  - requests

  - pip:
      - staintools==2.1.2
      - spams-bin==2.6.12
      - openslide-python==1.1.2
      - git+https://github.com/choosehappy/HistoQC.git
      - tensorflow==2.12.1 
      - tensorboard==2.12.3